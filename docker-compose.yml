version: '3.9'

services:
  # ─── Infrastructure ───────────────────────────────────────────────────────
  neo4j:
    image: neo4j:5.15-community
    container_name: chainsense-neo4j
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt protocol
    environment:
      NEO4J_AUTH: "neo4j/chainsense2026"
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "chainsense2026", "RETURN 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: chainsense-redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  postgres:
    image: postgres:16-alpine
    container_name: chainsense-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: chainsense_audit
      POSTGRES_USER: chainsense
      POSTGRES_PASSWORD: chainsense2026
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/audit_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chainsense -d chainsense_audit"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Application Services ────────────────────────────────────────────────
  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile.python
    container_name: chainsense-orchestrator
    command: python orchestrator/main.py
    env_file: .env
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./models:/app/models  # LLaMA GGUF model files

  backend:
    build:
      context: .
      dockerfile: Dockerfile.python
    container_name: chainsense-backend
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - orchestrator
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.node
    container_name: chainsense-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_WS_URL: ws://localhost:8000/ws
    depends_on:
      - backend

volumes:
  neo4j_data:
  neo4j_logs:
  redis_data:
  postgres_data:
